server:
  port: 5004

spring:
  application:
    name: location-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_location_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect